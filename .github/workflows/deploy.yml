name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject user list from secret
        env:
          WIKI_USERS: ${{ secrets.WIKI_USERS }}
        run: |
          python3 - << 'PYEOF'
          import json, sys, os

          raw = os.environ.get('WIKI_USERS', '').strip()

          if not raw:
              print("ERROR: WIKI_USERS secret is empty.")
              sys.exit(1)

          try:
              users = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"ERROR: WIKI_USERS is not valid JSON: {e}")
              sys.exit(1)

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          marker = '<!-- __WIKI_USERS_SCRIPT__ -->'
          if marker not in html:
              print("ERROR: marker comment not found in index.html")
              sys.exit(1)

          # Inject as a separate <script> block — safe from any string collision
          users_json = json.dumps(users, ensure_ascii=False)
          script_tag = f'<script>window.__WIKI_USERS__ = {users_json};</script>'
          html = html.replace(marker, script_tag)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print(f"Injected {len(users)} user(s)")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
