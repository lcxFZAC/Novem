name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject user list from secret
        env:
          WIKI_USERS: ${{ secrets.WIKI_USERS }}
        run: |
          # Replace __USERS_INJECT__ placeholder in index.html with the secret value.
          # WIKI_USERS must be valid JSON, e.g.:
          # [{"github_username":"alice","role":"admin"},{"github_username":"bob","role":"editor"}]
          #
          # We write the secret to a temp file to avoid shell escaping issues,
          # then use Python to do the substitution safely.
          echo "$WIKI_USERS" > /tmp/users.json
          python3 - << 'PYEOF'
          import json, sys

          with open('/tmp/users.json', 'r') as f:
              raw = f.read().strip()

          if not raw:
              print("ERROR: WIKI_USERS secret is empty. Add it in Settings → Secrets → Actions.")
              sys.exit(1)

          try:
              users = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"ERROR: WIKI_USERS is not valid JSON: {e}")
              sys.exit(1)

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          if '__USERS_INJECT__' not in html:
              print("ERROR: __USERS_INJECT__ placeholder not found in index.html")
              sys.exit(1)

          users_js = json.dumps(users, ensure_ascii=False)
          html = html.replace('__USERS_INJECT__', users_js)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print(f"✓ Injected {len(users)} user(s) into index.html")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
